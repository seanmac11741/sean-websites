name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR using the review structure and guidelines in .claude/skills/pr_review/SKILL.md.

            Steps:
            1. Read .claude/skills/pr_review/SKILL.md for the review format and rules
            2. Read any heavily modified files for full context
            3. Write your review following the review structure in the skill file

            Rules:
            - Do NOT push code, merge, or modify any files — this is a read-only review
            - If the diff is empty, say so and stop
            - If the diff is very large (>2000 lines), focus on the most important files and note that you skimmed the rest
            - Keep the review concise and actionable
          claude_args: "--max-turns 10"
